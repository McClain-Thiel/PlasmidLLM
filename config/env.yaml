catalog: plasmids

schemas:
  bronze: plsdb_bronze
  silver: plsdb_silver
  gold: plsdb_gold
  platinum: plsdb_platinum

volumes:
  fasta_dir: /Volumes/plasmids/plsdb_bronze/fasta
  gold_config_dir: /Volumes/plasmids/plsdb_gold/config
  exports_dir: /Volumes/plasmids/plsdb_platinum/exports

tables:
  # Bronze inputs (expected to exist OR loaded by 02_ingest_bronze_tables.py)
  bronze_nuccore: nuccore
  bronze_taxonomy: taxonomy
  bronze_amr: amr
  bronze_typing: typing

  # Bronze outputs
  bronze_sequences: sequences

  # Silver outputs
  silver_plasmid_metadata: plasmid_metadata
  silver_plasmid_taxonomy: plasmid_taxonomy
  silver_plasmid_amr: plasmid_amr
  silver_plasmid_replicons: plasmid_replicons
  silver_plasmid_mobility: plasmid_mobility

  # Gold outputs
  gold_token_frequencies: token_frequencies
  gold_token_vocabulary: token_vocabulary
  gold_plasmid_features: plasmid_features
  gold_plasmid_features_filtered: plasmid_features_filtered

  # Platinum outputs
  platinum_tag_assignments: tag_assignments
  platinum_training_pairs_raw: training_pairs_raw
  platinum_sequences_joined: sequences_joined
  platinum_train_pairs: train_pairs
  platinum_val_pairs: val_pairs
  platinum_test_pairs: test_pairs
