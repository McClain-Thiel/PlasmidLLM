thresholds:
  amr_min_freq: 100
  host_min_freq: 400
  rep_min_freq: 200

critical_amr:
  - blaCTX-M
  - blaKPC
  - blaNDM
  - blaOXA-48
  - blaOXA-23
  - mcr-1
  - mcr-2
  - mcr-3
  - vanA
  - vanB
  - mecA

meta_tokens:
  - {category: AMR, value: any}
  - {category: AMR, value: none}
  - {category: HOST, value: any}
  - {category: REP, value: any}
  - {category: MOB, value: any}
  - {category: MOB, value: conjugative}
  - {category: MOB, value: mobilizable}
  - {category: MOB, value: non-mobilizable}
  - {category: SIZE, value: small}
  - {category: SIZE, value: medium}
  - {category: SIZE, value: large}
  - {category: GC, value: any}
  - {category: GC, value: low}
  - {category: GC, value: mid}
  - {category: GC, value: high}

tagging:
  include_gc_prob_denom: 2     # 1/denom chance to include GC tag (deterministic)
  include_amr_none_prob_denom: 2  # 1/denom chance to include AMR:none when has_no_amr
