name: grpo-dense-motif
cloud: helix-anyscale-cloud
compute_config:
  cloud: helix-anyscale-cloud
  head_node:
    instance_type: g5.2xlarge
  worker_nodes: []
image_uri: anyscale/ray:2.54.0-py312-cu128
requirements:
  - torch>=2.1,<2.10
  - transformers>=4.38
  - tokenizers>=0.15
  - pyarrow>=14.0
  - pandas>=2.0
  - parasail>=1.3.0
  - biopython>=1.80
  - wandb>=0.16
  - boto3>=1.28
  - safetensors>=0.4
entrypoint: python anyscale/run_anyscale.py
max_retries: 0
env_vars:
  WANDB_API_KEY: "${WANDB_API_KEY}"
  HF_TOKEN: "${HF_TOKEN}"
  PYTHONPATH: "."
